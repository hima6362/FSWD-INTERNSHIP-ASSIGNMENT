<!DOCTYPE html>
<html>
<head>
<title>Responsive Hero Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:50px;
background:#f5f5f5;
min-height:100vh;
}

.hero-text{
max-width:500px;
}

.hero-text h1{
font-size:40px;
margin-bottom:20px;
}

.hero-text p{
margin-bottom:20px;
line-height:1.6;
}

.hero-text button{
padding:10px 20px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

.hero-image img{
width:400px;
}

/* Mobile Responsive */

@media(max-width:768px){

.hero{
flex-direction:column;
text-align:center;
}

.hero-image img{
width:250px;
margin-top:20px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-text">

<h1>Build Amazing Websites</h1>

<p>
Learn modern web development using HTML, CSS and JavaScript.
Create responsive and beautiful websites easily.
</p>

<button>Get Started</button>

</div>

<div class="hero-image">

<img src="https://via.placeholder.com/400">

</div>

</section>

</body>
</html>
