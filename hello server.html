<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Hello Server</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        body.light {
            background: #f4f4f4;
            color: black;
        }

        body.dark {
            background: #121212;
            color: white;
        }

        nav {
            background: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a.active {
            color: yellow;
        }

        button {
            padding: 6px 10px;
            margin-left: 10px;
        }

        .container {
            margin-top: 50px;
            text-align: center;
        }

        .card {
            display: inline-block;
            padding: 25px;
            border-radius: 12px;
            background: white;
            color: black;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        body.dark .card {
            background: #1e1e1e;
            color: white;
        }

        input {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body class="light">

<nav>
    <a href="#/" id="home">Home</a>
    <a href="#/about" id="about">About</a>
    <a href="#/contact" id="contact">Contact</a>
    <a href="#/services" id="services">Services</a>
    <button onclick="toggleMode()">Toggle Mode</button>
</nav>

<div class="container">
    <div class="card" id="app"></div>
</div>

<script>
    let isLoggedIn = false;

    function toggleMode() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
    }

    function setActive(route) {
        document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));

        if (route === "#/" || route === "") document.getElementById("home").classList.add("active");
        else if (route === "#/about") document.getElementById("about").classList.add("active");
        else if (route === "#/contact") document.getElementById("contact").classList.add("active");
        else if (route === "#/services") document.getElementById("services").classList.add("active");
    }

    function renderPage() {
        let route = location.hash;
        let content = "";

        // Protect routes
        if (!isLoggedIn && route !== "#/login") {
            route = "#/login";
        }

        if (route === "#/login" || route === "") {
            content = `
                <h2>Login</h2>
                <input id="user" placeholder="Username"><br>
                <input id="pass" type="password" placeholder="Password"><br>
                <button onclick="login()">Login</button>
            `;
        } 
        else if (route === "#/") {
            content = "<h2>Home</h2><p>Welcome to Home Page</p>";
        } 
        else if (route === "#/about") {
            content = "<h2>About</h2><p>This is About Page</p>";
        } 
        else if (route === "#/contact") {
            content = "<h2>Contact</h2><p>Phone: 9876543210</p>";
        } 
        else if (route === "#/services") {
            content = "<h2>Services</h2><p>Web Development & Design</p>";
        } 
        else {
            content = "<h2>404</h2><p>Page Not Found</p>";
        }

        document.getElementById("app").innerHTML = content;
        setActive(route);
    }

    function login() {
        let user = document.getElementById("user").value;
        let pass = document.getElementById("pass").value;

        if (user === "admin" && pass === "1234") {
            isLoggedIn = true;
            location.hash = "#/";
        } else {
            alert("Invalid Login!");
        }
    }

    window.addEventListener("load", renderPage);
    window.addEventListener("hashchange", renderPage);
</script>

</body>
</html>
