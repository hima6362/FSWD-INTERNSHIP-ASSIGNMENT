<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Listing UI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .filters {
            text-align: center;
            margin: 20px;
        }

        select, input {
            padding: 8px;
            margin: 5px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #ff5722;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #e64a19;
        }
    </style>
</head>
<body>

<header> Mini E-Commerce</header>

<div class="filters">
    <input type="text" id="search" placeholder="Search product..." onkeyup="filterProducts()">
    
    <select id="category" onchange="filterProducts()">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
    </select>

    <select id="price" onchange="filterProducts()">
        <option value="all">All Prices</option>
        <option value="low">Below ₹500</option>
        <option value="high">Above ₹500</option>
    </select>
</div>

<div class="products" id="productList"></div>

<script>
    const products = [
    {
        name: "T-Shirt",
        price: 300,
        category: "clothing",
        img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
    },
    {
        name: "Jeans",
        price: 800,
        category: "clothing",
        img: "https://images.unsplash.com/photo-1542272604-787c3835535d"
    },
    {
        name: "Mobile",
        price: 12000,
        category: "electronics",
        img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
    },
    {
        name: "Headphones",
        price: 700,
        category: "electronics",
        img: "https://images.unsplash.com/photo-1580894908361-967195033215"
    },
    {
        name: "Shoes",
        price: 500,
        category: "clothing",
        img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"
    },
    {
        name: "Watch",
        price: 1500,
        category: "electronics",
        img: "https://images.unsplash.com/photo-1519741497674-611481863552"
    }
];

    function displayProducts(list) {
        let output = "";
        list.forEach(p => {
            output += `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">₹${p.price}</p>
                    <button>Add to Cart</button>
                </div>
            `;
        });
        document.getElementById("productList").innerHTML = output;
    }

    function filterProducts() {
        let search = document.getElementById("search").value.toLowerCase();
        let category = document.getElementById("category").value;
        let price = document.getElementById("price").value;

        let filtered = products.filter(p => {
            let matchSearch = p.name.toLowerCase().includes(search);
            let matchCategory = category === "all" || p.category === category;
            let matchPrice = price === "all" ||
                (price === "low" && p.price < 500) ||
                (price === "high" && p.price >= 500);

            return matchSearch && matchCategory && matchPrice;
        });

        displayProducts(filtered);
    }

    // Initial load
    displayProducts(products);
</script>

</body>
</html>
